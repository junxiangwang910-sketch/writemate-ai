<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考宝 | 我的报告</title>
  <link rel="stylesheet" href="mvp.css">
</head>
<body data-page="student-home">
  <div class="student-shell">
    <section class="mobile-card">
      <p class="brand-title">高考宝</p>
      <h1 class="mobile-title" id="mobileStudentName">学生</h1>
      <p class="card-note" id="mobileExamName">最近一次考试</p>
      <span class="score-badge" id="mobileScore">--</span>
    </section>

    <section class="mobile-card student-layout">
      <h2 class="card-title">这次先补什么</h2>
      <ul class="list" id="mobileWeakPoints"></ul>
      <p class="card-note" id="mobileTrackSummary"></p>
      <div class="actions-row">
        <a class="button" id="taskLink" href="/gaokao/student-task.html">查看训练任务</a>
      </div>
    </section>
  </div>
  <script src="mvp.js"></script>
</body>
</html>
