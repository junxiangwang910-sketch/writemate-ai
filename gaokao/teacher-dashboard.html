<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考宝 | 老师工作台</title>
  <link rel="stylesheet" href="/gaokao/mvp.css">
</head>
<body data-page="teacher-dashboard">
  <div class="page-shell">
    <header class="topbar">
      <div>
        <p class="brand-title">高考宝 · 楚汉高中</p>
        <p class="brand-subtitle">高二数学 · 2025-2026学年第二学期 / 当前位置：工作台</p>
      </div>
      <nav class="nav">
        <a data-nav-page="teacher-dashboard" href="/gaokao/teacher-dashboard.html">工作台</a>
        <a data-nav-page="exam-new" href="/gaokao/exam-new.html">新建考试</a>
        <a data-nav-page="exam-upload" href="/gaokao/exam-upload.html">上传答题卡</a>
        <a data-nav-page="exam-analysis" href="/gaokao/exam-analysis.html">考试分析</a>
        <a data-nav-page="student-track" href="/gaokao/student-track.html">学生跟踪</a>
      </nav>
    </header>

    <section class="section">
      <div class="section-header">
        <h1 class="section-title">高二数学考后分析工作台</h1>
        <p class="section-note">先看最近考试，再决定本周讲评和重点学生跟进。</p>
      </div>
      <div class="alert-banner">⚠️ 本周重点：6名学生连续两次成绩下滑，建议优先查看学生跟踪页面</div>
    </section>

    <section class="section">
      <div class="grid cols-2">
        <article class="card">
          <h2 class="card-title">本次月考最需要关注的 3 件事</h2>
          <div class="priority-list" id="principalFocusList"></div>
        </article>
        <article class="card">
          <h2 class="card-title">班级横向对比</h2>
          <div class="compare-grid" id="classCompareList"></div>
        </article>
      </div>
    </section>

    <section class="section">
      <div class="grid cols-4">
        <article class="card stat-card">
          <p class="stat-label">最近考试数</p>
          <strong id="statExamCount">0</strong>
        </article>
        <article class="card stat-card">
          <p class="stat-label">平均分</p>
          <strong id="statAverage">0</strong>
        </article>
        <article class="card stat-card">
          <p class="stat-label">已录入学生</p>
          <strong id="statStudents">0</strong>
        </article>
        <article class="card stat-card alert">
          <p class="stat-label">待跟进学生</p>
          <strong id="statFollowUp">0</strong>
        </article>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">最近考试</h2>
        <p class="section-note">从这里进入分析页或继续补传答题卡。</p>
      </div>
      <div class="exam-list" id="examList"></div>
    </section>
  </div>
  <script src="/gaokao/mvp.js"></script>
</body>
</html>
