<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考宝 | 考试分析</title>
  <link rel="stylesheet" href="/gaokao/mvp.css">
</head>
<body data-page="exam-analysis">
  <div class="page-shell">
    <header class="topbar">
      <div>
        <p class="brand-title">高考宝 · 楚汉高中</p>
        <p class="brand-subtitle">高二数学 · 2025-2026学年第二学期 / 当前位置：考试分析</p>
      </div>
      <nav class="nav">
        <a data-nav-page="teacher-dashboard" href="/gaokao/teacher-dashboard.html">工作台</a>
        <a data-nav-page="exam-new" href="/gaokao/exam-new.html">新建考试</a>
        <a data-nav-page="exam-upload" href="/gaokao/exam-upload.html">上传答题卡</a>
        <a data-nav-page="exam-analysis" href="/gaokao/exam-analysis.html">考试分析</a>
        <a data-nav-page="student-track" href="/gaokao/student-track.html">学生跟踪</a>
      </nav>
    </header>

    <section class="section">
      <div class="section-header">
        <h1 class="section-title" id="analysisTitle">考试分析</h1>
        <p class="section-note" id="analysisMeta">请选择已上传数据的考试。</p>
      </div>
      <div class="grid cols-2">
        <article class="card">
          <p class="stat-label">班级均分</p>
          <strong class="stat-value" id="analysisAverage">0</strong>
        </article>
        <article class="card">
          <p class="stat-label">学生数</p>
          <strong class="stat-value" id="analysisStudents">0</strong>
        </article>
      </div>
      <p class="status-box" id="analysisStatus" data-status>等待分析数据。</p>
    </section>

    <section class="section">
      <div class="grid cols-2">
        <article class="card">
          <h2 class="card-title">讲评优先级推荐</h2>
          <div class="priority-list" id="lecturePriorityList"></div>
        </article>
        <article class="card">
          <h2 class="card-title">错因分布</h2>
          <div class="bar-chart" id="errorDistribution"></div>
          <p class="mini-note" id="errorDistributionNote"></p>
        </article>
      </div>
    </section>

    <section class="section">
      <div class="grid cols-2">
        <article class="card">
          <h2 class="card-title">高频错因</h2>
          <ul class="list" id="issueList"></ul>
        </article>
        <article class="card">
          <h2 class="card-title">班级讲评建议</h2>
          <ul class="list" id="lectureSuggestions"></ul>
        </article>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">题目分析</h2>
      </div>
      <div class="grid cols-2" id="questionStats"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">待重点跟进学生</h2>
      </div>
      <div class="student-list" id="highRiskStudents"></div>
    </section>
  </div>
  <script src="/gaokao/mvp.js"></script>
</body>
</html>
