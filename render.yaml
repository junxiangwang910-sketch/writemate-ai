services:
  - type: web
    name: studypath-ai
    runtime: node
    branch: main
    rootDir: study-abroad-advisor
    autoDeployTrigger: commit
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: ACTIVATION_CODES
        value: STUDY-DEMO-2026
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
  - type: web
    name: shenlunbao-ai
    runtime: docker
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: SITE_VARIANT
        value: shenlun
      - key: AI_PROVIDER
        value: deepseek
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: OCR_PROVIDER
        value: auto
      - key: BAIDU_OCR_ENDPOINT
        value: general_basic
      - key: ACTIVATION_CODES
        value: SHENLUN-TEST-001,SHENLUN-TEST-002,SHENLUN-TEST-003,SHENLUN-TEST-004,SHENLUN-TEST-005
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BAIDU_OCR_API_KEY
        sync: false
      - key: BAIDU_OCR_SECRET_KEY
        sync: false
